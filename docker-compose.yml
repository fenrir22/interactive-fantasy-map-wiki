services:
  aetherion:
    image: ghcr.io/fenrir22/interactive-fantasy-map-wiki:latest
    ports:
      - "3000:3000"
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
      - SESSION_SECRET=aetherion-secret-change-me
      - APP_LANG=it
      - DATA_PATH=/app/data
    volumes:
      - ./data:/app/data
    restart: unless-stopped
