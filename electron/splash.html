<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080c1a;
    color: #f0e6d3;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  .logo {
    font-size: 2.2rem;
    color: #c9a84c;
    letter-spacing: 4px;
    margin-bottom: 8px;
    font-weight: bold;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #a8987a;
    font-style: italic;
    margin-bottom: 40px;
  }
  .loader {
    width: 60px;
    height: 60px;
    border: 3px solid rgba(201, 168, 76, 0.15);
    border-top: 3px solid #c9a84c;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 24px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .status {
    font-size: 0.85rem;
    color: #a8987a;
    font-style: italic;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="logo">AETHERION</div>
  <div class="subtitle">Interactive Fantasy Map Wiki</div>
  <div class="loader"></div>
  <div class="status">Starting server...</div>
</body>
</html>
